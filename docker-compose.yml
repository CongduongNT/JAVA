
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: planbookai
      MYSQL_ROOT_PASSWORD:  ${MYSQL_PASSWORD:-root}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: planbookai
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT}
      SUPABASE_S3_ACCESS_KEY: ${SUPABASE_S3_ACCESS_KEY}
      SUPABASE_S3_SECRET_KEY: ${SUPABASE_S3_SECRET_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
