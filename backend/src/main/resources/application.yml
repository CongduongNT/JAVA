spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:planbookai}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:16112005}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
supabase:
  url: dummy
  key: dummy
  bucket: planbookai-storage
  s3:
    endpoint: https://example.com
    region: ap-southeast-1
    accessKey: dummy
    secretKey: dummy
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash

jwt:
  secret: ${JWT_SECRET:planbookai-super-secret-key-for-jwt-2024}
  expiration: 86400000
