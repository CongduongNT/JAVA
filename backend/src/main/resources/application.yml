spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:planbookai}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:2004duong}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
supabase:
  url: dummy
  key: dummy
  bucket: planbookai-storage
  s3:
    endpoint: https://example.com
    region: ap-southeast-1
    accessKey: dummy
    secretKey: dummy
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash

jwt:
  secret: ${JWT_SECRET:planbookai-super-secret-key-long-enough-for-security-2024}
  expiration: 86400000

# ── VNPay ────────────────────────────────────────────────────────────────────
vnpay:
  tmn-code:    ${VNPAY_TMN_CODE:VNPAYTEST}
  hash-secret: ${VNPAY_HASH_SECRET:RAOEXHYVSDDIIENL}
  payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url:  ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payment/vnpay/return}
  ipn-url:     ${VNPAY_IPN_URL:}
  version:     2.1.0

# ── Application ──────────────────────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
