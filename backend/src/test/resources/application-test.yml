spring:
  datasource:
    url: jdbc:h2:mem:planbookai;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false

app:
  seed:
    enabled: false

supabase:
  url: dummy
  key: dummy
  bucket: planbookai-storage
  s3:
    endpoint: https://example.com
    region: ap-southeast-1
    accessKey: dummy
    secretKey: dummy

gemini:
  api-key: ""

jwt:
  secret: planbookai-super-secret-key-for-jwt-2024
  expiration: 86400000
